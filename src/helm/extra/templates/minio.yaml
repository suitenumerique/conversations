---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio
  namespace: {{ .Release.Namespace | quote }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
spec:
  rules:
  - host: "minio-conversations.127.0.0.1.nip.io"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: minio
            port:
              number: 9000
  tls:
  - hosts:
    - minio-conversations.127.0.0.1.nip.io
    secretName: conversations-tls
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ .Release.Namespace | quote }}
spec:
  ports:
  - name: client
    port: 9000
    protocol: TCP
    targetPort: 9000
  - name: console
    port: 9001
    protocol: TCP
    targetPort: 9001
  selector:
    app.kubernetes.io/instance: extra
    app.kubernetes.io/name: minio
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/instance: extra
    app.kubernetes.io/name: minio
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: extra
      app.kubernetes.io/name: minio
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: extra
        app.kubernetes.io/name: minio
    spec:
      containers:
      - name: minio
        command:
          - /bin/sh
          - -c
          - |
            minio server --console-address :9001 /data
        env:
          - name: MINIO_ROOT_USER
            value: conversations
          - name: MINIO_ROOT_PASSWORD
            value: password
        image: "minio/minio:RELEASE.2025-09-07T16-13-09Z"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
          name: client
        - containerPort: 9001
          name: console
        volumeMounts:
        - mountPath: /data
          name: data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket
  namespace: {{ .Release.Namespace | quote }}
spec:
  template:
    spec:
      containers:
      - name: mc
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        command:
          - /bin/sh
          - -c
          - |
            until /usr/bin/mc alias set conversations http://minio:9000 conversations password; do
              echo "Waiting for minio..."
              sleep 5
            done
            /usr/bin/mc mb --ignore-existing conversations/conversations-media-storage
            exit 0
      restartPolicy: Never
  backoffLimit: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: {{ .Release.Namespace | quote }}
spec:
  ports:
  - name: tcp-redis
    port: 6379
    protocol: TCP
    targetPort: tcp-redis
  selector:
    app.kubernetes.io/instance: extra
    app.kubernetes.io/name: redis
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis
  namespace: {{ .Release.Namespace | quote }}
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    user default on >pass ~* &* +@all
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/instance: extra
    app.kubernetes.io/name: redis
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: extra
      app.kubernetes.io/name: redis
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: extra
        app.kubernetes.io/name: redis
    spec:
      containers:
      - name: redis
        args:
          - redis-server
          - /usr/local/etc/redis/redis.conf
        image: "redis:8.2-alpine"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
          name: tcp-redis
        volumeMounts:
        - name: redis
          mountPath: "/usr/local/etc/redis"
          readOnly: true
      volumes:
      - name: redis
        configMap:
          name: redis
