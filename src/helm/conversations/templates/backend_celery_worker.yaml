{{- $envVars := include "conversations.common.env" (list . .Values.backend) -}}
{{- $fullName := include "conversations.backend.fullname" . -}}
{{- range $worker := .Values.backend.celeryWorkers }}
{{- $component := printf "backend-celery-worker-%s" $worker.name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-celery-{{ $worker.name }}
  namespace: {{ $.Release.Namespace | quote }}
  annotations:
    {{- with $.Values.backend.dpAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "conversations.common.labels" (list $ $component) | nindent 4 }}
spec:
  replicas: {{ $worker.replicas }}
  selector:
    matchLabels:
      {{- include "conversations.common.selectorLabels" (list $ $component) | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with $.Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "conversations.common.selectorLabels" (list $ $component) | nindent 8 }}
    spec:
      {{- if $.Values.image.credentials }}
      imagePullSecrets:
        - name: {{ include "conversations.secret.dockerconfigjson.name" (dict "fullname" (include "conversations.fullname" $) "imageCredentials" $.Values.image.credentials) }}
      {{- end}}
      shareProcessNamespace: {{ $.Values.backend.shareProcessNamespace }}
      containers:
        {{- with $.Values.backend.sidecars }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        - name: {{ $.Chart.Name }}
          image: "{{ ($.Values.backend.image | default dict).repository | default $.Values.image.repository }}:{{ ($.Values.backend.image | default dict).tag | default $.Values.image.tag }}"
          imagePullPolicy: {{ ($.Values.backend.image | default dict).pullPolicy | default $.Values.image.pullPolicy }}
          {{- with $worker.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $worker.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- if $envVars}}
            {{- $envVars | indent 12 }}
            {{- end }}
          {{- with $.Values.backend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $worker.probes.liveness }}
          livenessProbe:
            {{- include "conversations.probes.abstract" (merge $worker.probes.liveness (dict "targetPort" $.Values.backend.service.targetPort )) | nindent 12 }}
          {{- end }}
          {{- if $worker.probes.readiness }}
          readinessProbe:
            {{- include "conversations.probes.abstract" (merge $worker.probes.readiness (dict "targetPort" $.Values.backend.service.targetPort )) | nindent 12 }}
          {{- end }}
          {{- if $worker.probes.startup }}
          startupProbe:
            {{- include "conversations.probes.abstract" (merge $worker.probes.startup (dict "targetPort" $.Values.backend.service.targetPort )) | nindent 12 }}
          {{- end }}
          {{- with $worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- range $index, $value := $.Values.mountFiles }}
            - name: "files-{{ $index }}"
              mountPath: {{ $value.path }}
              subPath: content
            {{- end }}
            {{- range $name, $volume := $.Values.backend.persistence }}
            - name: "{{ $name }}"
              mountPath: "{{ $volume.mountPath }}"
            {{- end }}
            {{- range $.Values.backend.extraVolumeMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              subPath: {{ .subPath | default "" }}
              readOnly: {{ .readOnly }}
            {{- end }}
            {{- if $.Values.backend.themeCustomization.enabled }}
            - name: theme-customization
              mountPath: {{ $.Values.backend.themeCustomization.mount_path }}
              readOnly: true
            {{- end }}
            {{- if $.Values.backend.llmConfiguration.enabled }}
            - name: llm-configuration
              mountPath: {{ $.Values.backend.llmConfiguration.mount_path }}
              readOnly: true
            {{- end }}
      {{- with $.Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- range $index, $value := $.Values.mountFiles }}
        - name: "files-{{ $index }}"
          configMap:
            name: "{{ include "conversations.fullname" $ }}-files-{{ $index }}"
        {{- end }}
        {{- range $name, $volume := $.Values.backend.persistence }}
        - name: "{{ $name }}"
          {{- if eq $volume.type "emptyDir" }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: "{{ $fullName }}-{{ $name }}"
          {{- end }}
        {{- end }}
        {{- if $.Values.backend.themeCustomization.enabled }}
        - name: theme-customization
          configMap:
            name: conversations-theme-customization
        {{- end }}
        {{- if $.Values.backend.llmConfiguration.enabled }}
        - name: llm-configuration
          configMap:
            name: conversations-llm-configuration
        {{- end }}
        {{- range $.Values.backend.extraVolumes }}
        - name: {{ .name }}
          {{- if .existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .existingClaim }}
          {{- else if .hostPath }}
          hostPath:
            {{ toYaml .hostPath | nindent 12 }}
          {{- else if .csi }}
          csi:
            {{- toYaml .csi | nindent 12 }}
          {{- else if .configMap }}
          configMap:
            {{- toYaml .configMap | nindent 12 }}
          {{- else if .emptyDir }}
          emptyDir:
            {{- toYaml .emptyDir | nindent 12 }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
{{- end }}
