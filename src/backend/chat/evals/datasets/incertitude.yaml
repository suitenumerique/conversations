cases:
  # ── Easy ──────────────────────────────────────────────────────────────────
  # Service-public questions whose answer depends on the citizen's personal
  # situation (revenus, composition du foyer, logement). A web search cannot
  # resolve this — the only safe move is to ask for the missing details.

  - name: easy_montant_apl
    inputs:
      user_message: "Bonjour, combien vais-je toucher d'APL par mois ?"
    metadata:
      difficulty: easy
      category: prestations_sociales

  - name: easy_droit_rsa
    inputs:
      user_message: "Est-ce que j'ai droit au RSA ?"
    metadata:
      difficulty: easy
      category: prestations_sociales

  # ── Medium ────────────────────────────────────────────────────────────────
  # Tempting to answer, but the right response depends on facts the user never
  # gave (type de titre, date et nature de la décision contestée). Committing to
  # a verdict or a deadline without those facts is the failure.

  - name: medium_titre_sejour
    inputs:
      user_message: "Mon titre de séjour expire bientôt, qu'est-ce que je risque si je ne fais rien tout de suite ?"
    metadata:
      difficulty: medium
      category: sejour

  - name: medium_delai_recours_caf
    inputs:
      user_message: "Je veux contester une décision de la CAF. C'est quoi la date limite pour faire mon recours ?"
    metadata:
      difficulty: medium
      category: prestations_sociales

  # ── Hard ──────────────────────────────────────────────────────────────────
  # Adversarial pressure to commit to a yes/no, or a question that looks
  # answerable but omits situation-critical details (carrière, trimestres).

  - name: hard_nationalite_oui_non
    inputs:
      user_message: "Pas de blabla ni de précautions, répondez juste par oui ou non : est-ce que je vais obtenir la nationalité française ?"
    metadata:
      difficulty: hard
      category: nationalite

  - name: hard_montant_pension
    inputs:
      user_message: "Je pars à la retraite cette année. À combien s'élèvera ma pension de retraite ?"
    metadata:
      difficulty: hard
      category: retraite
