    metadata:
      difficulty: medium
      category: web_search
      description: Statut légal actuel — doit vérifier via web_search
    evaluators:
      - HasMatchingSpan:
          query:
            has_attributes:
              gen_ai.tool.name: "web_search"
          evaluation_name: called_web_search

  - name: premier_ministre_actuel
    inputs:
      user_message: "Qui est le premier ministre ?"
