    metadata:
      difficulty: hard
      category: web_search
      description: >-
        Fonction politique changeante — le modèle peut répondre de mémoire au lieu
        de vérifier via web_search
    evaluators:
      - HasMatchingSpan:
          query:
            has_attributes:
              gen_ai.tool.name: "web_search"
          evaluation_name: called_web_search

  # ── WEB SEARCH — borderline (implicite temporel) ────────────────────────────
