server {
  listen 8080;
  listen 3000;
  server_name localhost;

  # Emit relative Location headers on directory redirects. Behind the TLS
  # ingress, absolute redirects would otherwise leak nginx's own scheme/port
  # (e.g. http://host:8080/), which is unreachable publicly.
  absolute_redirect off;

  root /usr/share/nginx/html;

  # Single-page app: every unknown path falls back to index.html so the
  # client-side router can handle it. Unknown routes therefore return HTTP 200
  # and the app renders its own 404 page.
  location / {
      try_files $uri $uri/ /index.html;
  }
}
